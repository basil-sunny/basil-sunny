<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills — Basil Sunny</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
/* ===== Skills page — scoped additions (reuses global tokens) ===== */
.skills-list{display:grid;gap:16px}

.skillcat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);overflow:hidden;transition:.22s}
.skillcat:hover{border-color:var(--line-2)}
.skillcat.open{box-shadow:0 12px 34px rgba(15,30,52,.10)}

.skillcat-head{display:flex;align-items:center;gap:18px;width:100%;text-align:left;cursor:pointer;
  background:none;border:0;padding:22px 26px;font-family:inherit}
.skillcat-num{font-size:13px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums;
  width:26px;flex-shrink:0}
.skillcat-ic{width:46px;height:46px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;
  background:#eaf2fd;font-size:21px}
.skillcat-tt{flex:1;min-width:0}
.skillcat-tt h3{font-size:18px;line-height:1.25}
.skillcat-tt p{font-size:13.5px;color:var(--slate-2);margin-top:2px}
.skillcat-chev{flex-shrink:0;color:var(--slate-2);font-size:13px;transition:transform .25s ease}
.skillcat.open .skillcat-chev{transform:rotate(90deg);color:var(--accent)}

.skillcat-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s ease}
.skillcat.open .skillcat-body{grid-template-rows:1fr}
.skillcat-body-in{overflow:hidden}

.skillgroup{padding:0 26px}
.skillgroup-sub{display:flex;align-items:baseline;gap:10px;padding:15px 0 11px;border-top:1px solid var(--line)}
.skillgroup-sub h4{font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink)}
.skillgroup-sub .badge{font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--accent);background:#eaf2fd;border-radius:5px;padding:2px 8px}
.skillgroup-sub .badge.gold{color:var(--gold);background:#f7efe1}

.chips{display:flex;flex-wrap:wrap;gap:8px;padding-bottom:18px}
.chip{font-size:13.5px;color:var(--slate);background:var(--bg);border:1px solid var(--line);
  border-radius:6px;padding:6px 12px;transition:.15s}
.chip:hover{border-color:var(--line-2);color:var(--ink)}
.chip.lead{color:var(--accent-dk);border-color:#bcd6f6;background:#eaf2fd;font-weight:500}
.chips-flat{padding:8px 26px 22px}

@media(max-width:680px){
  .skillcat-num{display:none}
  .skillcat-head{padding:18px;gap:14px}
  .skillgroup,.chips-flat{padding-left:18px;padding-right:18px}
}

/* Certifications section */
.certifications{margin-top:24px;padding-top:24px;border-top:1px solid var(--line)}
.certifications-head{margin-bottom:28px}
.certifications-head h2{font-size:clamp(26px,3.6vw,34px);color:var(--ink)}
.certifications-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px}
.cert-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:24px;box-shadow:var(--shadow);transition:.22s}
.cert-card:hover{transform:translateY(-2px);border-color:var(--line-2);box-shadow:0 10px 28px rgba(15,30,52,.08)}
.cert-card .cert-badge{display:inline-block;font-size:11.5px;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;color:var(--accent);background:#eaf2fd;border-radius:5px;padding:4px 10px;margin-bottom:14px}
.cert-card h3{font-size:18px;color:var(--ink);margin-bottom:8px}
.cert-card p{font-size:13.5px;color:var(--slate-2);margin:6px 0}
</style>
</head>
<body>

<nav class="nav">
  <div class="wrap nav-in">
    <a href="index.html" class="brand">
      <span class="mark">BS</span>
      <span class="who"><b>Basil Sunny</b><span>DevOps Architect</span></span>
    </a>
    <div class="nav-links" id="navlinks">
      <a href="index.html">Home</a>
      <a href="problems.html">Solutions</a>
      <a href="skills.html" class="active">Skills</a>
      <a href="contact.html">Contact</a>
    </div>
    <button class="menu-btn" id="menuBtn" aria-label="Menu">≡</button>
  </div>
</nav>

<section class="pagehead">
  <div class="wrap">
    <div class="eyebrow">Skills</div>
    <h1>Tools &amp; capabilities</h1>
    <p class="sub">The platforms, tooling, and practices I work with day to day — organised by discipline. </p>
  </div>
</section>

<section>
  <div class="wrap">
    <div class="skills-list" id="skillsList"></div>
  </div>
</section>

<section>
  <div class="wrap">
    <div class="certifications">
      <div class="certifications-head">
        <h2>Certifications</h2>
      </div>
      <div class="certifications-grid">
        <div class="cert-card reveal">
          <span class="cert-badge">RedHat</span>
          <h3>Certified Engineer (RHEL 7)</h3>
          <p><strong>Certification ID:</strong> 150-174-316</p>
        </div>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="wrap foot-in">
    <span>© 2026 Basil Sunny</span>
  </div>
</footer>

<script src="app.js"></script>
<script>
/* ---------------------------------------------------------------------------
   EDIT YOUR SKILLS HERE
   - Each category has an icon, title, sub-line, and either:
       items:  a flat chip list, or
       groups: sub-categories (e.g. AWS / GCP) each with their own chips.
   - Mark a headline skill with  lead:true  to highlight it.
   - Add/remove/reorder freely — the page rebuilds automatically.
--------------------------------------------------------------------------- */
const SKILLS = [
  {
    icon:"🐧", title:"Operating Systems", sub:"Linux administration across enterprise and community distros",
    items:[
      {name:"Red Hat Enterprise Linux",lead:true},{name:"Debian",lead:true},{name:"Alpine Linux",lead:true},
      {name:"Networking & firewall"},{name:"Package management (yum / apt / apk)"},
      {name:"Performance tuning"},{name:"Patching & hardening"}
    ]
  },
  {
    icon:"⌨️", title:"Scripting & Automation", sub:"Glue code and tooling that removes operational toil",
    items:[
      {name:"Bash",lead:true},{name:"Python",lead:true},{name:"Ruby",lead:true},{name:"YAML / JSON"}
    ]
  },
  {
    icon:"☁️", title:"Cloud Platforms", sub:"Designing and operating production cloud environments",
    groups:[
      {label:"AWS", badge:"Primary", badgeGold:true, chips:[
        {name:"VPC",lead:true},{name:"EC2",lead:true},{name:"S3"},
        {name:"EKS"},{name:"IAM"},{name:"RDS / Aurora"},{name:"Lambda"},{name:"CloudWatch"},
        {name:"Route 53"},{name:"ELB / ALB / NLB"},{name:"Auto Scaling"},{name:"CloudFront"},
        {name:"EBS / EFS"},{name:"ECR"},{name:"Amazon managed Prometheus"},{name:"Amazon managed Grafana"},{name:"DataPipeline"},
        {name:"WAF v2"},{name:"DynamoDB"},{name:"Secrets Manager"},{name:"CloudTrail"},{name:"CloudFormation"},{name:"API Gateway"}, 
        {name:"Amazon MQ"}, {name:"ElastiCache"}, {name:"CodeBuild"}, {name:"CodeDeploy"}, {name:"CodePipeline"}
      ]},
      {label:"GCP", badge:"Secondary", chips:[
        {name:"VPC",lead:true},{name:"GCE"},{name:"GKE"},{name:"Cloud Storage"},
        {name:"IAM"},{name:"Cloud Load Balancing"},{name:"Cloud Monitoring"}
      ]},
      {label:"On-prem / Other", badge:"", chips:[
        {name:"OpenShift"}
      ]}
    ]
  },
  {
    icon:"📐", title:"Infrastructure as Code", sub:"Provisioning and configuration management",
    items:[
      {name:"Terraform",lead:true},{name:"CloudFormation",lead:true},{name:"Ansible",lead:true},
      {name:"Chef"},{name:"GitOps workflows"}
    ]
  },
  {
    icon:"📦", title:"Containers & Orchestration", sub:"Packaging and running workloads at scale",
    items:[
      {name:"Docker",lead:true},{name:"Kubernetes",lead:true},{name:"EKS"},{name:"GKE"},
      {name:"Helm"},{name:"KEDA"},{name:"Karpenter"},{name:"kubectl"},
      {name:"Autoscaling (HPA / CA)"},{name:"Ingress controllers"},{name:"Container registries"}
    ]
  },
  {
    icon:"🔁", title:"CI / CD & Delivery", sub:"Build, test, and deployment pipelines",
    items:[
      {name:"Git",lead:true},{name:"Jenkins",lead:true},{name:"CircleCI",lead:true},
      {name:"Harness CI"},{name:"Octopus Deploy"},{name:"Gitlab CI/CD"}
    ]
  },
  {
    icon:"📊", title:"Observability & Monitoring", sub:"Metrics, logs, dashboards, and alerting",
    groups:[
      {label:"Metrics & Dashboards", badge:"", chips:[
        {name:"Prometheus",lead:true},{name:"Grafana",lead:true},
        {name:"Zabbix"},{name:"New Relic"},{name:"Nagios"}
      ]},
      {label:"Logging", badge:"", chips:[
        {name:"ELK Stack",lead:true},{name:"Elasticsearch"},{name:"Logstash"},
        {name:"Kibana"},{name:"Elastic Cloud"},{name:"Fluentd"}
      ]},
      {label:"Alerting & On-call", badge:"", chips:[
        {name:"Opsgenie",lead:true},{name:"Alertmanager"}
      ]}
    ]
  },
  {
    icon:"🖥️", title:"Virtualization & Hosting", sub:"Hypervisors and server management",
    items:[
      {name:"KVM",lead:true},{name:"XEN Hypervisor",lead:true},{name:"OpenVZ",lead:true},
      {name:"cPanel"},{name:"Nginx"},{name:"Apache HTTP Server"}
    ]
  }
];

(function(){
  const list = document.getElementById('skillsList');
  const esc = s => s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const chip = c => `<span class="chip${c.lead?' lead':''}">${esc(c.name)}</span>`;

  SKILLS.forEach((cat, i) => {
    const num = String(i + 1).padStart(2, '0');
    let body = '';
    if (cat.groups){
      body = cat.groups.map(g => `
        <div class="skillgroup">
          <div class="skillgroup-sub">
            <h4>${esc(g.label)}</h4>
            ${g.badge ? `<span class="badge${g.badgeGold?' gold':''}">${esc(g.badge)}</span>` : ''}
          </div>
          <div class="chips">${g.chips.map(chip).join('')}</div>
        </div>`).join('');
    } else {
      body = `<div class="chips-flat"><div class="chips">${cat.items.map(chip).join('')}</div></div>`;
    }

    const el = document.createElement('div');
    el.className = 'skillcat open';
    el.innerHTML = `
      <button class="skillcat-head" aria-expanded="true">
        <span class="skillcat-num">${num}</span>
        <span class="skillcat-ic">${cat.icon}</span>
        <span class="skillcat-tt"><h3>${esc(cat.title)}</h3><p>${esc(cat.sub)}</p></span>
        <span class="skillcat-chev">▶</span>
      </button>
      <div class="skillcat-body"><div class="skillcat-body-in">${body}</div></div>`;

    const head = el.querySelector('.skillcat-head');
    head.addEventListener('click', () => {
      const open = el.classList.toggle('open');
      head.setAttribute('aria-expanded', open);
    });
    list.appendChild(el);
  });
})();
</script>
</body>
</html>
